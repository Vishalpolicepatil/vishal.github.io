<!DOCTYPE html>
<html>
<head>
<title>Vishal Patil | Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #0d1117;
    color: white;
    display: flex;
}

/* RIGHT SIDE NAVBAR */
.sidebar {
    width: 200px;
    background: #161b22;
    height: 100vh;
    position: fixed;
    right: 0;
    top: 0;
    padding-top: 50px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 15px;
    text-align: center;
}

.sidebar a:hover {
    background: #30363d;
}

/* MAIN CONTENT */
.content {
    margin-right: 200px;
    padding: 40px;
    width: 100%;
}

/* HOME SECTION */
.home {
    display: flex;
    align-items: center;
    gap: 30px;
}

.home img {
    width: 250px;
    border-radius: 10px;
}

/* CONTACT FORM */
form {
    display: flex;
    flex-direction: column;
    max-width: 400px;
}

input, textarea {
    margin: 10px 0;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px;
    background: #58a6ff;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

h1 {
    color: #58a6ff;
}
</style>

</head>

<body>

<!-- RIGHT NAV -->
<div class="sidebar">
    <a href="#home">Home</a>
    <a href="#courses">Courses</a>
    <a href="#contact">Contact</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

<!-- HOME -->
<section id="home" class="home">
    <img src="yourphoto.jpg" alt="My Photo">

    <div>
        <h1>Hi, I'm Vishal 👋</h1>
        <p>
            I am an Electronics and Communication Engineering student at UVCE.
            Passionate about Analog IC Design, ASIC development, and electronics research.
        </p>
    </div>
</section>

<!-- COURSES -->
<section id="courses">
    <h1>Courses</h1>
    <p>Analog Electronics, VLSI Design, Control Systems, Embedded Systems</p>
</section>

<!-- CONTACT -->
<section id="contact">
    <h1>Contact Me</h1>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="text" placeholder="Subject" required>
        <textarea rows="5" placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>

</section>

</div>

</body>
</html>
